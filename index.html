<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal File Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .quality-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .quality-btn {
            padding: 10px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            color: #555;
        }

        .quality-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .quality-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .download-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .download-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            display: block;
        }

        .video-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }

        .video-info.show {
            display: block;
        }

        .video-info h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
        }

        .video-info p {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>File Downloader</h1>
        <p class="subtitle">Download your own files from direct links on any device</p>

        <div class="input-group">
            <label for="videoUrl">Direct File URL:</label>
            <input type="text" id="videoUrl" placeholder="https://example.com/file.mp4" />
        </div>

        <button class="download-btn" id="downloadBtn">Download File</button>

        <div class="status" id="status"></div>

        <div class="video-info" id="videoInfo"></div>
    </div>

    <script>
        // Download button
        document.getElementById('downloadBtn').addEventListener('click', async function() {
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const statusDiv = document.getElementById('status');
            const downloadBtn = document.getElementById('downloadBtn');
            const videoInfoDiv = document.getElementById('videoInfo');

            // Reset status
            statusDiv.className = 'status';
            statusDiv.style.display = 'none';
            videoInfoDiv.classList.remove('show');

            // Validate URL
            if (!videoUrl) {
                statusDiv.className = 'status error';
                statusDiv.textContent = 'Please enter a direct file URL';
                return;
            }

            if (!videoUrl.startsWith('http://') && !videoUrl.startsWith('https://')) {
                statusDiv.className = 'status error';
                statusDiv.textContent = 'Please enter a valid http/https URL';
                return;
            }

            // Show loading
            downloadBtn.disabled = true;
            downloadBtn.innerHTML = 'Processing...<span class="spinner"></span>';
            statusDiv.className = 'status info';
            statusDiv.textContent = 'Fetching video information...';

            try {
                // Send request to server
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: videoUrl
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Download failed');
                }

                // Show video info
                videoInfoDiv.innerHTML = `
                    <h3>${data.title}</h3>
                    <p><strong>File Size:</strong> ${data.duration}</p>
                    <p><strong>Type:</strong> ${data.mime || 'Unknown'}</p>
                `;
                videoInfoDiv.classList.add('show');

                // Start download
                statusDiv.className = 'status success';
                statusDiv.textContent = 'Starting download...';

                // Trigger download
                const downloadLink = document.createElement('a');
                downloadLink.href = `/download-file?url=${encodeURIComponent(videoUrl)}`;
                downloadLink.download = data.title || 'download.bin';
                downloadLink.click();

                setTimeout(() => {
                    statusDiv.textContent = 'Download started! Check your downloads folder.';
                }, 1000);

            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = 'Error: ' + error.message;
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = 'Download File';
            }
        });
    </script>
</body>
</html>
